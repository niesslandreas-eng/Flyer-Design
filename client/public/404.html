    <title>Mellas Kreativwerkstatt</title>
    <script type="text/javascript">
        // Dieser Trick leitet GitHub Pages Pfade an die index.html weiter
        var l = window.location;
        l.replace(l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') + l.pathname.split('/').slice(0, 1).join('/') + '/?p=/' + l.pathname.slice(1));
    </script>
</head>
